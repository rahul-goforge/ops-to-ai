<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090E;--s1:#0E1019;--s2:#141722;--s3:#1A1E2E;
  --l-bg:#F5F3EE;--l-s1:#FFFFFF;--l-text:#1A1A2E;--l-text2:#5A5E72;--l-border:rgba(0,0,0,.08);
  --mint:#00E8B0;--mint-d:#00A67D;--mint-dim:rgba(0,232,176,.1);
  --violet:#7C5CFC;--sky:#38BDF8;--rose:#FB7185;
  --text:#E8ECF4;--text2:#8B9AB8;--text3:#4B5672;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --radius:14px;
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--l-bg);color:var(--l-text);line-height:1.7;min-height:100vh}
::selection{background:rgba(0,232,176,.25)}

/* NAV (dark) */
.nav{position:sticky;top:0;z-index:100;padding:0 clamp(20px,4vw,48px);height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,9,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-left{display:flex;align-items:center;gap:20px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-signal{width:10px;height:10px;border-radius:50%;background:var(--mint);box-shadow:0 0 12px var(--mint)}
.logo-word{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#fff}
.logo-word .arr{color:var(--mint)}
.nav-page{font-size:13px;color:var(--text3);padding-left:20px;border-left:1px solid var(--border)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-back{font-size:13px;color:var(--text2);text-decoration:none}
.nav-back:hover{color:var(--mint)}
.auth-btn{font-size:13px;font-weight:600;padding:7px 16px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
.auth-login{background:var(--mint);color:var(--bg)}
.auth-login:hover{background:#00d4a0}
.auth-user{background:var(--s2);color:var(--text);border:1px solid var(--border2)}
.auth-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover}
.auth-logout{font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);padding:4px 10px;border-radius:6px;cursor:pointer;margin-left:4px}
.auth-logout:hover{color:var(--rose);border-color:rgba(251,113,133,.3)}
.auth-hide{display:none!important}
.auth-group{display:flex;align-items:center;gap:8px}
.auth-name{font-size:13px;font-weight:500;color:var(--text);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MAIN */
.main{max-width:760px;margin:0 auto;padding:32px clamp(16px,4vw,40px) 80px}

/* HEADER */
.blog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.blog-header h1{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--l-text);letter-spacing:-.5px}
.write-btn{font-size:14px;font-weight:600;padding:10px 20px;border-radius:10px;border:none;background:var(--bg);color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.write-btn:hover{background:var(--s3);transform:translateY(-1px)}
.write-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* TAG FILTER */
.tag-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.tag-f{font-size:12px;padding:5px 12px;border-radius:16px;border:1px solid var(--l-border);background:var(--l-s1);color:var(--l-text2);cursor:pointer;transition:all .15s}
.tag-f:hover{border-color:rgba(0,0,0,.2)}
.tag-f.active{background:var(--bg);color:var(--text);border-color:transparent}

/* POST CARD */
.post-card{background:var(--l-s1);border:1px solid var(--l-border);border-radius:var(--radius);padding:24px;margin-bottom:14px;transition:all .2s;cursor:pointer}
.post-card:hover{border-color:rgba(0,0,0,.15);box-shadow:0 4px 20px rgba(0,0,0,.05);transform:translateY(-2px)}
.pc-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pc-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#ddd}
.pc-avatar-empty{display:flex;align-items:center;justify-content:center;background:var(--mint-dim);color:var(--mint-d);font-weight:700;font-size:12px;flex-shrink:0}
.pc-author{font-size:13px;font-weight:600;color:var(--l-text)}
.pc-date{font-size:12px;color:var(--l-text2)}
.pc-title{font-family:'Outfit',sans-serif;font-size:19px;font-weight:700;color:var(--l-text);line-height:1.3;margin-bottom:8px;letter-spacing:-.3px}
.pc-excerpt{font-size:14px;color:var(--l-text2);line-height:1.65;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pc-foot{display:flex;align-items:center;gap:16px}
.pc-tags{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.pc-tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.04);color:var(--l-text2)}
.pc-stats{display:flex;gap:14px;font-size:12.5px;color:var(--l-text2);flex-shrink:0}
.pc-stat{display:flex;align-items:center;gap:4px}

/* SINGLE POST VIEW */
.single-post{display:none}
.sp-back{font-size:13px;color:var(--mint-d);text-decoration:none;display:inline-flex;align-items:center;gap:5px;margin-bottom:24px;cursor:pointer}
.sp-back:hover{gap:8px}
.sp-title{font-family:'Outfit',sans-serif;font-size:clamp(28px,4vw,36px);font-weight:800;color:var(--l-text);letter-spacing:-1px;line-height:1.15;margin-bottom:12px}
.sp-meta{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--l-border)}

/* Markdown styles */
.md-p{margin-bottom:14px}
.md-h2{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--l-text);margin:28px 0 12px;letter-spacing:-.3px}
.md-h3{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--l-text);margin:24px 0 10px;letter-spacing:-.2px}
.md-h4{font-size:15px;font-weight:600;color:var(--l-text);margin:20px 0 8px}
.md-code-block{background:#1a1e2e;color:#e8ecf4;border-radius:10px;padding:18px;overflow-x:auto;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6}
.md-inline-code{font-family:'JetBrains Mono',monospace;font-size:13px;background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;color:#7C5CFC}
.md-link{color:var(--mint-d);text-decoration:none;border-bottom:1px solid rgba(0,166,125,.3);transition:border-color .15s}
.md-link:hover{border-color:var(--mint-d)}
.md-ul,.md-ol{margin:12px 0 12px 24px}
.md-li,.md-oli{margin-bottom:6px;line-height:1.65}

.sp-content{font-size:15px;color:var(--l-text);line-height:1.8;white-space:pre-wrap;word-wrap:break-word}
.sp-content code{font-family:'JetBrains Mono',monospace;font-size:13px;background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px}
.sp-vote{display:flex;align-items:center;gap:10px;margin:28px 0;padding:18px 0;border-top:1px solid var(--l-border);border-bottom:1px solid var(--l-border)}
.vote-btn{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:8px 16px;border-radius:8px;border:1px solid var(--l-border);background:var(--l-s1);color:var(--l-text2);cursor:pointer;transition:all .15s}
.vote-btn:hover{border-color:var(--mint-d);color:var(--mint-d)}
.vote-btn.voted{background:var(--mint-dim);border-color:rgba(0,232,176,.3);color:var(--mint-d)}
.vote-count{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--l-text)}

/* COMMENTS */
.comments-section{margin-top:32px}
.comments-section h3{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--l-text);margin-bottom:16px}
.comment{padding:16px;background:var(--l-s1);border:1px solid var(--l-border);border-radius:10px;margin-bottom:10px}
.comment-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;background:#ddd}
.comment-author{font-size:13px;font-weight:600;color:var(--l-text)}
.comment-date{font-size:11px;color:var(--l-text2)}
.comment-body{font-size:14px;color:var(--l-text2);line-height:1.65}
.comment-form{margin-top:16px;display:flex;gap:10px}
.comment-input{flex:1;padding:10px 14px;border:1px solid var(--l-border);border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;background:var(--l-s1);color:var(--l-text);outline:none;resize:none;min-height:44px}
.comment-input:focus{border-color:rgba(0,232,176,.4)}
.comment-submit{padding:10px 18px;border:none;background:var(--bg);color:var(--text);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s;flex-shrink:0}
.comment-submit:hover{background:var(--s3)}

/* WRITE FORM */
.write-view{display:none}
.wf-group{margin-bottom:18px}
.wf-label{font-size:12px;font-weight:600;color:var(--l-text);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.06em}
.wf-input{width:100%;padding:12px 16px;border:1px solid var(--l-border);border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;background:var(--l-s1);color:var(--l-text);outline:none}
.wf-input:focus{border-color:rgba(0,232,176,.4)}
.wf-textarea{width:100%;padding:14px 16px;border:1px solid var(--l-border);border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;background:var(--l-s1);color:var(--l-text);outline:none;resize:vertical;min-height:240px;line-height:1.7}
.wf-textarea:focus{border-color:rgba(0,232,176,.4)}
.wf-help{font-size:12px;color:var(--l-text2);margin-top:4px}
.wf-actions{display:flex;gap:10px;margin-top:24px}
.wf-publish{padding:12px 24px;border:none;background:var(--mint);color:var(--bg);font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;transition:all .2s}
.wf-publish:hover{background:#00d4a0}
.wf-cancel{padding:12px 24px;border:1px solid var(--l-border);background:var(--l-s1);color:var(--l-text2);font-size:14px;font-weight:500;border-radius:10px;cursor:pointer}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--l-text);margin-bottom:6px}
.empty-desc{font-size:14px;color:var(--l-text2)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--l-text2);font-size:14px}

/* FOOTER */
.blog-footer{padding:24px;text-align:center;border-top:1px solid var(--l-border);margin-top:40px}
.blog-footer a{color:var(--l-text2);text-decoration:none;font-size:13px}
.blog-footer a:hover{color:var(--mint-d)}

/* MOBILE */
@media(max-width:600px){
  .main{padding:20px 16px 60px}
  .nav-page{display:none}
  .blog-header h1{font-size:22px}
  .pc-title{font-size:17px}
}
</style>

<script>

function renderMarkdown(text) {
  if (!text) return '';
  var html = text;
  // Escape HTML first
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre class="md-code-block"><code class="language-' + (lang||'text') + '">' + code.trim() + '</code></pre>';
  });
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code class="md-inline-code">$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h4 class="md-h4">$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3 class="md-h3">$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2 class="md-h2">$1</h2>');
  // Links [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="md-link">$1</a>');
  // Unordered lists
  html = html.replace(/^[\-\*] (.+)$/gm, '<li class="md-li">$1</li>');
  html = html.replace(/(<li class="md-li">.*<\/li>\n?)+/g, function(m) { return '<ul class="md-ul">' + m + '</ul>'; });
  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li class="md-oli">$1</li>');
  html = html.replace(/(<li class="md-oli">.*<\/li>\n?)+/g, function(m) { return '<ol class="md-ol">' + m + '</ol>'; });
  // Line breaks (double newline = paragraph)
  html = html.replace(/\n\n/g, '</p><p class="md-p">');
  html = '<p class="md-p">' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p class="md-p"><\/p>/g, '');
  html = html.replace(/<p class="md-p">(<(?:pre|h[234]|ul|ol))/g, '$1');
  html = html.replace(/(<\/(?:pre|h[234]|ul|ol)>)<\/p>/g, '$1');
  return html;
}

var currentUser = null;
var currentPostId = null;
var allPosts = [];
var currentTagFilter = 'all';

// ============================================
// INIT
// ============================================
async function init() {
  var sb = getSupabase();
  if (!sb) {
    document.getElementById('postsList').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Supabase not configured</div><div class="empty-desc">Add your Supabase URL and key to config.js to enable the blog.</div></div>';
    return;
  }

  try {
    var res = await sb.auth.getUser();
    currentUser = res.data.user;
  } catch (e) { currentUser = null; }

  if (currentUser) {
    document.getElementById('loginBtn').style.display = 'none';
    document.getElementById('userArea').classList.remove('auth-hide');
    document.getElementById('writeBtn').disabled = false;
    document.getElementById('commentForm').style.display = 'flex';
    var profile = await getUserProfile(currentUser.id);
    var name = profile ? profile.display_name : currentUser.email;
    var avatar = profile ? profile.avatar_url : '';
    document.getElementById('userName').textContent = name;
    if (avatar) { var img = document.getElementById('userAvatar'); img.src = safeURL(avatar); img.style.display = 'block'; }
  }

  // Check URL hash for post view
  if (window.location.hash.startsWith('#post/')) {
    var postId = window.location.hash.replace('#post/', '');
    await showPost(postId);
  } else {
    await loadPosts();
  }
}

// ============================================
// LOAD POSTS
// ============================================
async function loadPosts() {
  var sb = getSupabase();
  if (!sb) return;

  // Fetch posts
  var res = await sb.from('posts').select('*').order('created_at', { ascending: false });
  if (res.error) {
    console.error('[ops-to-ai] Posts query error:', res.error);
    document.getElementById('postsList').innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-title">No posts yet</div><div class="empty-desc">Be the first to share something! Sign in with GitHub and write a post.</div></div>';
    return;
  }

  var posts = res.data || [];
  if (posts.length === 0) {
    allPosts = [];
    renderPosts();
    return;
  }

  // Fetch profiles for all authors
  var authorIds = [...new Set(posts.map(function(p){return p.author_id}))];
  var profRes = await sb.from('profiles').select('*').in('id', authorIds);
  var profileMap = {};
  if (profRes.data) profRes.data.forEach(function(p){ profileMap[p.id] = p; });

  // Fetch vote counts
  var postIds = posts.map(function(p){return p.id});
  var voteRes = await sb.from('post_votes').select('post_id');
  var voteCounts = {};
  if (voteRes.data) voteRes.data.forEach(function(v){
    voteCounts[v.post_id] = (voteCounts[v.post_id] || 0) + 1;
  });

  // Fetch comment counts
  var commentRes = await sb.from('comments').select('post_id');
  var commentCounts = {};
  if (commentRes.data) commentRes.data.forEach(function(c){
    commentCounts[c.post_id] = (commentCounts[c.post_id] || 0) + 1;
  });

  // Merge
  allPosts = posts.map(function(p){
    p.profile = profileMap[p.author_id] || {};
    p.vote_count = voteCounts[p.id] || 0;
    p.comment_count = commentCounts[p.id] || 0;
    return p;
  });

  renderPosts();
}

function renderPosts() {
  var container = document.getElementById('postsList');
  var filtered = allPosts;

  if (currentTagFilter !== 'all') {
    filtered = allPosts.filter(function(p) {
      return p.tags && p.tags.some(function(t) { return t.toLowerCase() === currentTagFilter; });
    });
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-title">No posts yet</div><div class="empty-desc">' +
      (currentTagFilter !== 'all' ? 'No posts with tag "' + currentTagFilter + '" yet.' : 'Be the first to share something!') + '</div></div>';
    return;
  }

  var html = '';
  filtered.forEach(function(p) {
    var profile = p.profile || {};
    var votes = p.vote_count || 0;
    var comments = p.comment_count || 0;
    var date = new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    html += '<div class="post-card" onclick="showPost(\'' + p.id + '\')">';
    html += '<div class="pc-meta">';
    var pcAv = safeURL(profile.avatar_url);
    html += pcAv ? '<img class="pc-avatar" src="' + escHTML(pcAv) + '" alt=""/>' : '<div class="pc-avatar pc-avatar-empty">' + escHTML((profile.display_name||'?').charAt(0).toUpperCase()) + '</div>';
    html += '<span class="pc-author">' + escHTML(profile.display_name || 'Anonymous') + '</span>';
    html += '<span class="pc-date">' + date + '</span></div>';
    html += '<div class="pc-title">' + escHTML(p.title) + '</div>';
    html += '<div class="pc-excerpt">' + escHTML(p.content) + '</div>';
    html += '<div class="pc-foot"><div class="pc-tags">';
    if (p.tags) p.tags.forEach(function(t) { html += '<span class="pc-tag">' + escHTML(t) + '</span>'; });
    html += '</div><div class="pc-stats">';
    html += '<span class="pc-stat">▲ ' + votes + '</span>';
    html += '<span class="pc-stat">💬 ' + comments + '</span>';
    html += '</div></div></div>';
  });

  container.innerHTML = html;
}

// ============================================
// SINGLE POST
// ============================================
async function showPost(postId) {
  currentPostId = postId;
  window.location.hash = 'post/' + postId;

  document.getElementById('listView').style.display = 'none';
  document.getElementById('writeView').style.display = 'none';
  document.getElementById('singleView').style.display = 'block';

  var sb = getSupabase();
  if (!sb) return;

  // Load post
  var res = await sb.from('posts').select('*').eq('id', postId).single();
  if (res.error || !res.data) return;
  var post = res.data;
  var profRes = await sb.from('profiles').select('*').eq('id', post.author_id).single();
  var profile = profRes.data || {};
  var date = new Date(post.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  document.getElementById('spTitle').textContent = post.title;
  document.getElementById('spMeta').innerHTML =
    (safeURL(profile.avatar_url) ? '<img class="pc-avatar" src="' + escHTML(safeURL(profile.avatar_url)) + '"/>' : '<div class="pc-avatar pc-avatar-empty">' + escHTML((profile.display_name||'?').charAt(0).toUpperCase()) + '</div>') +
    '<span class="pc-author">' + escHTML(profile.display_name || 'Anonymous') + '</span>' +
    '<span class="pc-date">' + date + '</span>';
  document.getElementById('spContent').innerHTML = renderMarkdown(post.content);

  // Show comment form if logged in
  document.getElementById('commentForm').style.display = currentUser ? 'flex' : 'none';

  await loadVotes(postId);
  await loadComments(postId);
  window.scrollTo(0, 0);
}

// ============================================
// VOTES
// ============================================
async function loadVotes(postId) {
  var sb = getSupabase();
  if (!sb) return;

  var res = await sb.from('post_votes').select('user_id').eq('post_id', postId);
  var votes = res.data || [];
  document.getElementById('voteCount').textContent = votes.length;

  var btn = document.getElementById('voteBtn');
  if (currentUser && votes.some(function(v) { return v.user_id === currentUser.id; })) {
    btn.classList.add('voted');
    btn.textContent = '▲ Upvoted';
  } else {
    btn.classList.remove('voted');
    btn.textContent = '▲ Upvote';
  }
}

async function toggleVote() {
  if (!currentUser) { signInWithGitHub(); return; }
  var sb = getSupabase();
  if (!sb || !currentPostId) return;

  var btn = document.getElementById('voteBtn');
  if (btn.classList.contains('voted')) {
    await sb.from('post_votes').delete().eq('post_id', currentPostId).eq('user_id', currentUser.id);
  } else {
    await sb.from('post_votes').insert({ post_id: currentPostId, user_id: currentUser.id });
  }
  await loadVotes(currentPostId);
}

// ============================================
// COMMENTS
// ============================================
async function loadComments(postId) {
  var sb = getSupabase();
  if (!sb) return;

  var res = await sb.from('comments').select('*')
    .eq('post_id', postId).order('created_at', { ascending: true });

  var comments = res.data || [];

  // Fetch profiles for commenters
  if (comments.length > 0) {
    var cAuthorIds = [...new Set(comments.map(function(c){return c.author_id}))];
    var cpRes = await sb.from('profiles').select('*').in('id', cAuthorIds);
    var cpMap = {};
    if (cpRes.data) cpRes.data.forEach(function(p){ cpMap[p.id] = p; });
    comments.forEach(function(c){ c.profile = cpMap[c.author_id] || {}; });
  }
  document.getElementById('commentsTitle').textContent = 'Comments (' + comments.length + ')';

  if (comments.length === 0) {
    document.getElementById('commentsList').innerHTML = '<div style="color:var(--l-text2);font-size:14px;padding:16px 0">No comments yet. Be the first!</div>';
    return;
  }

  var html = '';
  comments.forEach(function(c) {
    var profile = c.profile || {};
    var date = new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    html += '<div class="comment">';
    html += '<div class="comment-meta">';
    var cAv = safeURL(profile.avatar_url);
    html += cAv ? '<img class="comment-avatar" src="' + escHTML(cAv) + '"/>' : '<div class="comment-avatar pc-avatar-empty">' + escHTML((profile.display_name||'?').charAt(0).toUpperCase()) + '</div>';
    html += '<span class="comment-author">' + escHTML(profile.display_name || 'Anonymous') + '</span>';
    html += '<span class="comment-date">' + date + '</span></div>';
    html += '<div class="comment-body">' + escHTML(c.content) + '</div></div>';
  });
  document.getElementById('commentsList').innerHTML = html;
}

async function submitComment() {
  if (!currentUser || !currentPostId) return;
  var input = document.getElementById('commentInput');
  var text = input.value.trim();
  if (!text) return;
  if (text.length > 2000) { alert('Comment must be under 2,000 characters.'); return; }

  var sb = getSupabase();
  if (!sb) return;

  await sb.from('comments').insert({
    post_id: currentPostId,
    author_id: currentUser.id,
    content: text
  });

  input.value = '';
  await loadComments(currentPostId);
}

// ============================================
// WRITE POST
// ============================================
function showWrite() {
  if (!currentUser) { signInWithGitHub(); return; }
  document.getElementById('listView').style.display = 'none';
  document.getElementById('singleView').style.display = 'none';
  document.getElementById('writeView').style.display = 'block';
  window.location.hash = 'write';
}

async function publishPost() {
  if (!currentUser) return;
  var title = document.getElementById('wfTitle').value.trim();
  var content = document.getElementById('wfContent').value.trim();
  var tagsRaw = document.getElementById('wfTags').value.trim();

  if (!title || !content) { alert('Title and content are required.'); return; }

  var tags = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim().toLowerCase(); }).filter(Boolean) : [];

  var sb = getSupabase();
  if (!sb) return;

  var res = await sb.from('posts').insert({
    author_id: currentUser.id,
    title: title,
    content: content,
    tags: tags
  }).select().single();

  if (res.error) { alert('Error publishing: ' + res.error.message); return; }

  document.getElementById('wfTitle').value = '';
  document.getElementById('wfContent').value = '';
  document.getElementById('wfTags').value = '';

  showList();
}

// ============================================
// NAVIGATION
// ============================================
function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('singleView').style.display = 'none';
  document.getElementById('writeView').style.display = 'none';
  window.location.hash = '';
  currentPostId = null;
  loadPosts();
}

function filterTag(tag, btn) {
  currentTagFilter = tag;
  document.querySelectorAll('.tag-f').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderPosts();
}

function escHTML(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function safeURL(url) {
  if (!url) return '';
  try {
    var u = new URL(url);
    if (u.protocol !== 'https:' && u.protocol !== 'http:') return '';
    return u.href;
  } catch(e) { return ''; }
}

function safeAvatar(url) {
  var safe = safeURL(url);
  return safe ? '<img src="' + escHTML(safe) + '" class="' : '<div class="';
}

// Handle browser back button
window.addEventListener('hashchange', function() {
  if (!window.location.hash || window.location.hash === '#') showList();
});

// ============================================
// INIT
// ============================================
init();
</script>
